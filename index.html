<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEEE Ramadan Duas</title>
<style>
body {
  font-family: "Arial", sans-serif;
  background-color: #f0f4f8;
  color: #fff;
  text-align: center;
  margin: 0;
  padding: 0;
}

header {
  background-color: #0072C6; /* لون IEEE */
  padding: 20px;
}

header h1 {
  margin: 0;
  font-size: 28px;
}

.container {
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card {
  background-color: #1e3a5f; /* أزرق غامق متناسق */
  padding: 25px;
  border-radius: 15px;
  margin: 15px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

button {
  background-color: #00aaff;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 10px 20px;
  margin: 10px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background-color: #005f8a;
}

.counter {
  font-size: 36px;
  margin: 10px 0;
  color: #00ffff;
}

.dua-text {
  font-size: 20px;
  margin-bottom: 15px;
  min-height: 60px;
}
</style>
</head>
<body>

<header>
  <h1>IEEE جامعة النجاح – رمضان 🌙</h1>
</header>

<div class="container">

  <div class="card">
    <div class="dua-text" id="dua">اضغط للحصول على دعاء</div>
    <button onclick="newDua()">دعاء جديد</button>
  </div>

  <div class="card">
    <h3>عداد الاستغفار</h3>
    <div class="counter" id="count">0</div>
    <button onclick="increment()">استغفر الله</button>
    <button onclick="reset()">تصفير</button>
  </div>

</div>

<script>
const duas = [
"اللهم بلغنا رمضان لا فاقدين ولا مفقودين",
"اللهم إنك عفو تحب العفو فاعف عنا",
"اللهم ارزقنا حسن الخاتمة",
"اللهم اجعل القرآن ربيع قلوبنا",
"اللهم تقبل منا الصيام والقيام",
"اللهم اجعلنا من المقبولين"
];

function newDua(){
  const random = Math.floor(Math.random() * duas.length);
  document.getElementById("dua").innerText = duas[random];
}

// عداد الاستغفار
let count = 0;
function increment(){
  count++;
  document.getElementById("count").innerText = count;
}
function reset(){
  count = 0;
  document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
