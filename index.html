<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>IEEE NNU Ramadan</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Cairo", sans-serif;
        margin: 0;
        padding: 0;
        background: #fff;
        color: #0777a6;
        text-align: center;
        overflow-x: hidden;
      }
      header {
        background: #0777a6;
        color: #fff;
        padding: 30px 15px;
        box-shadow: 0 0 40px rgba(7, 119, 166, 0.6);
        border-bottom-left-radius: 30px;
        border-bottom-right-radius: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      header img {
        height: 110px;
        margin-bottom: 15px;
      }
      header h1 {
        margin: 0;
        font-size: 2.2em;
        font-weight: 700;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px 10px;
      }

      .card {
        background: linear-gradient(145deg, #e6f2fa, #fff);
        border-radius: 25px;
        padding: 25px;
        margin: 20px 0;
        width: 85%;
        max-width: 380px;
        box-shadow: 0 0 25px rgba(7, 119, 166, 0.35);
        border: 2px solid #0777a6;
      }

      .dua-text,
      .challenge {
        font-size: 20px;
        line-height: 1.6em;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .counter {
        font-size: 40px;
        margin: 15px 0;
        font-weight: bold;
      }

      button {
        font-family: "Cairo";
        background: linear-gradient(90deg, #0777a6, #055a86);
        color: #fff;
        border: none;
        border-radius: 20px;
        padding: 12px 28px;
        margin: 10px 5px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }
      button:hover {
        transform: scale(1.07);
      }

      .challenge {
        background: linear-gradient(90deg, #0777a6, #055a86);
        color: #fff;
        padding: 15px;
        border-radius: 20px;
      }

      @keyframes flash {
        50% {
          transform: scale(1.3);
        }
      }
    </style>
  </head>

  <body>
    <header>
      <img src="IEEE LOGO.jpeg" alt="شعار IEEE" />
      <h1>IEEE NNU Ramadan !</h1>
    </header>

    <div class="container">
      <div class="card">
        <h2>دعاء اليوم</h2>
        <div class="dua-text" id="dua">اضغط للحصول على دعاء</div>
        <button onclick="newDua()">دعاء جديد</button>
      </div>

      <div class="card">
        <h2>عداد الاستغفار</h2>
        <div class="counter" id="count">0</div>
        <button onclick="increment()">استغفر الله</button>
        <button onclick="reset()">تصفير</button>
      </div>

      <div class="card">
        <h2>تحدي اليوم</h2>
        <div class="challenge" id="challenge">اضغط لعرض التحدي</div>
        <button onclick="newChallenge()">تحدي جديد</button>
      </div>
    </div>

    <script>
      // ===== الأدعية =====
      const duas = [
        "اللهم إنك عفو تحب العفو فاعف عنا",
        "اللهم تقبل منا الصيام والقيام وصالح الأعمال",
        "اللهم اجعل القرآن ربيع قلوبنا ونور صدورنا",
        "اللهم اغفر لنا ولوالدينا وللمؤمنين والمؤمنات",
        "اللهم ارزقنا حسن الخاتمة",
        "اللهم ثبت قلوبنا على دينك",
        "اللهم ارزقنا الإخلاص في القول والعمل",
        "اللهم اجعلنا من المقبولين",
        "اللهم اعتق رقابنا من النار",
        "اللهم ارزقنا توبة نصوحاً",
        "اللهم ارزقنا قيام الليل بخشوع",
        "اللهم اهدنا واهد بنا",
        "اللهم اجعل خير أعمالنا خواتيمها",
        "اللهم اجعل هذا الشهر شاهدًا لنا لا علينا",
        "اللهم ارزقنا الدعاء المستجاب",
        "اللهم ارزقنا القرب منك",
        "اللهم اجعلنا من عبادك الصالحين",
      ];

      let duaIndex = 0;

      function newDua() {
        document.getElementById("dua").innerText = duas[duaIndex];
        duaIndex = (duaIndex + 1) % duas.length;
      }

      // ===== عداد الاستغفار =====
      let count = 0;

      function increment() {
        count++;
        const el = document.getElementById("count");
        el.innerText = count;
        el.style.animation = "flash 0.3s";
        setTimeout(() => {
          el.style.animation = "";
        }, 300);
        localStorage.setItem("count", count);
      }

      function reset() {
        count = 0;
        document.getElementById("count").innerText = count;
        localStorage.setItem("count", count);
      }

      // ===== التحديات الدينية والخيرية =====
      const challenges = [
        "اقرأ صفحتين من القرآن",
        "استغفر الله 100 مرة",
        "صلِّ ركعتين نافلة",
        "اقرأ أذكار الصباح كاملة",
        "اقرأ أذكار المساء كاملة",
        "صلِّ على النبي ﷺ 100 مرة",
        "قم الليل ولو بركعتين",
        "احفظ آية جديدة اليوم",
        "اقرأ تفسير آية واحدة",
        "تصدق بـ 5 شيكل على محتاج",
        "تبرع بطعام لأسرة محتاجة",
        "ضع ماءً في مكان للمارّة",
        "ادعُ لشخص بظهر الغيب",
        "سامح شخصاً ابتغاء وجه الله",
        "صلِّ السنن الرواتب كاملة اليوم",
        "تبرع بملابس صالحة للاستعمال",
        "شارك في صندوق تبرعات المسجد",
        "أطعم طيراً أو حيواناً بنية الصدقة",
        "اقرأ سورة الملك قبل النوم",
        "جدّد نيتك وأخلص عملك لله",
        "تبرع بكتاب ديني لشخص",
        "ادعُ للمسلمين في كل مكان",
      ];

      let challengeIndex = 0;

      function newChallenge() {
        document.getElementById("challenge").innerText =
          challenges[challengeIndex];
        challengeIndex = (challengeIndex + 1) % challenges.length;
      }

      // ===== تحميل الصفحة =====
      window.onload = function () {
        newDua();
        newChallenge();
        let saved = localStorage.getItem("count");
        if (saved) {
          count = parseInt(saved);
        }
        document.getElementById("count").innerText = count;
      };
    </script>
  </body>
</html>
