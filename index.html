<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IEEE NNU رمضان</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap"
      rel="stylesheet"
    />
    
    <style>
      body {
        font-family: "Cairo", sans-serif;
        margin: 0;
        padding: 0;
        background: #fff;
        color: #0777a6;
        text-align: center;
        overflow-x: hidden;
      }

      /* ===== هيدر ===== */
      header {
        background: #0777a6;
        color: #fff;
        padding: 30px 15px;
        box-shadow: 0 0 40px rgba(7, 119, 166, 0.6); /* ضوء أزرق حول الهيدر */
        border-bottom-left-radius: 30px;
        border-bottom-right-radius: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: box-shadow 0.5s;
      }
      header:hover {
        box-shadow: 0 0 60px rgba(7, 119, 166, 0.8);
      }
      header img {
        height: 120px;
        margin-bottom: 15px;
      }
      header h1 {
        margin: 0;
        font-size: 2.5em;
        font-weight: 700;
        letter-spacing: 2px;
        text-shadow: 0 0 10px rgba(7, 119, 166, 0.7); /* ضوء أزرق على النص */
      }

      /* ===== الحاويات ===== */
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px 10px;
      }

      /* ===== البطاقات ===== */
      .card {
        background: linear-gradient(145deg, #e6f2fa, #fff);
        border-radius: 25px;
        padding: 30px;
        margin: 20px 0;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 0 20px rgba(7, 119, 166, 0.3); /* ضوء أزرق حول البطاقات */
        border: 2px solid #0777a6;
        color: #0777a6;
        transition:
          transform 0.5s,
          box-shadow 0.5s;
      }
      .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 0 35px rgba(7, 119, 166, 0.6);
      }

      /* ===== نصوص ===== */
      .dua-text,
      .challenge {
        font-size: 22px;
        line-height: 1.5em;
        transition:
          transform 0.3s,
          color 0.3s,
          text-shadow 0.3s;
      }
      .counter {
        font-size: 45px;
        margin: 15px 0;
        font-weight: bold;
        transition:
          transform 0.3s,
          color 0.3s,
          text-shadow 0.3s;
      }

      /* ===== أزرار ===== */
      button {
        font-family: "Cairo", sans-serif;
        background: linear-gradient(90deg, #0777a6, #055a86);
        color: #fff;
        border: none;
        border-radius: 20px;
        padding: 12px 28px;
        margin: 10px 5px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.4s;
        box-shadow: 0 0 15px rgba(7, 119, 166, 0.5); /* ضوء أزرق على الأزرار */
      }
      button:hover {
        transform: scale(1.08);
        box-shadow: 0 0 30px rgba(7, 119, 166, 0.8);
      }

      /* ===== تحدي الخير اليوم ===== */
      .challenge {
        margin-bottom: 17px;
        background: linear-gradient(90deg, #0777a6, #055a86);
        color: #fff;
        padding: 20px 15px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 50px;
        text-align: center;
        box-shadow: 0 0 15px rgba(7, 119, 166, 0.5); /* ضوء أزرق */
      }

      /* ===== Animation ===== */
      @keyframes flash {
        0% {
          color: #0777a6;
          transform: scale(1);
          text-shadow: none;
        }
        50% {
          color: #055a86;
          transform: scale(1.3);
          text-shadow: 0 0 15px rgba(7, 119, 166, 0.7);
        }
        100% {
          color: #0777a6;
          transform: scale(1);
          text-shadow: none;
        }
      }

      /* ===== Responsive ===== */
      @media (max-width: 600px) {
        header img {
          height: 90px;
        }
        header h1 {
          font-size: 2em;
        }
        .dua-text,
        .challenge {
          font-size: 18px;
        }
        .counter {
          font-size: 35px;
        }
        button {
          font-size: 16px;
          padding: 10px 20px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <img src="IEEE LOGO.jpeg" alt="شعار IEEE" />
      <h1>IEEE NNU رمضان</h1>
    </header>

    <div class="container">
      <div class="card">
        <h2>دعاء اليوم</h2>
        <div class="dua-text" id="dua">اضغط للحصول على دعاء</div>
        <button onclick="newDua()">دعاء جديد</button>
      </div>

      <div class="card">
        <h2>عداد الاستغفار</h2>
        <div class="counter" id="count">0</div>
        <button onclick="increment()">استغفر الله</button>
        <button onclick="reset()">تصفير</button>
      </div>

      <div class="card">
        <h2>تحدي الخير اليوم</h2>
        <div class="challenge" id="challenge">اضغط لعرض التحدي</div>
        <button onclick="newChallenge()">تحدي جديد</button>
      </div>
    </div>

    <script>
      // ===== أدعية =====
      const duas = [
        "اللهم بلغنا رمضان لا فاقدين ولا مفقودين",
        "اللهم إنك عفو تحب العفو فاعف عنا",
        "اللهم ارزقنا حسن الخاتمة",
        "اللهم اجعل القرآن ربيع قلوبنا",
        "اللهم تقبل منا الصيام والقيام",
        "اللهم اجعلنا من المقبولين",
        "اللهم اجعلنا من عبادك الصالحين",
      ];
      function newDua() {
        const duaEl = document.getElementById("dua");
        duaEl.style.transform = "scale(0.95)";
        setTimeout(() => {
          const random = Math.floor(Math.random() * duas.length);
          duaEl.innerText = duas[random];
          duaEl.style.transform = "scale(1)";
        }, 150);
      }

      // ===== عداد الاستغفار =====
      let count = 0;
      function increment() {
        count++;
        const countEl = document.getElementById("count");
        countEl.innerText = count;
        countEl.style.animation = "flash 0.4s";
        setTimeout(() => {
          countEl.style.animation = "";
        }, 400);
        localStorage.setItem("count", count);
      }
      function reset() {
        count = 0;
        document.getElementById("count").innerText = count;
        localStorage.setItem("count", count);
      }
      window.onload = function () {
        newDua();
        newChallenge();
        const saved = localStorage.getItem("count");
        if (saved) count = parseInt(saved);
        document.getElementById("count").innerText = count;
      };

      // ===== تحديات الأعمال الخيرية =====
      const challenges = [
        "تصدق بـ 5 شيكل على المحتاجين اليوم",
        "ساعد جاراً في تنظيف حديقة منزله",
        "أرسل رسالة طيبة لشخص محتاج دعم",
        "تطوع ساعة واحدة في عمل خيري",
        "تبرع بكتاب أو لعبة لطفل محتاج",
        "نظّم خزانة الملابس للتبرع بما لا تحتاجه",
      ];
      function newChallenge() {
        const challengeEl = document.getElementById("challenge");
        challengeEl.style.transform = "scale(0.95)";
        setTimeout(() => {
          const random = Math.floor(Math.random() * challenges.length);
          challengeEl.innerText = challenges[random];
          challengeEl.style.transform = "scale(1)";
        }, 150);
      }
    </script>
  </body>
</html>
